<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopDemo | Admin Products</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav>
        <a href="/" class="brand">ShopDemo Admin</a>
        <div class="nav-links">
            <a href="/">Store View</a>
            <a href="/admin-products.html" class="active">Products</a>
            <a href="/admin-orders.html">Orders</a>
        </div>
    </nav>

    <div class="container animate-fade-in">
        <div class="header-flex">
            <h2>Product Management</h2>
            <button class="btn btn-primary" onclick="openModal()">+ New Product</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="product-table-body">
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="product-modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Add Product</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="product-form">
                <input type="hidden" id="prod-id">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="prod-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="number" step="0.01" id="prod-price" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="prod-image" class="form-control">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="prod-desc" class="form-control" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Save Product</button>
            </form>
        </div>
    </div>

    <script src="/utils/handle-response.js"></script>

    <script>
        let products = [];

        async function fetchProducts() {
            const res = await fetch('/api/products');
            products = await res.json();
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('product-table-body');
            tbody.innerHTML = '';
            products.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td>#${p.id}</td>
                        <td><img src="${p.imageUrl || 'https://via.placeholder.com/50'}" style="width: 50px; height: 50px; border-radius: 8px; object-fit: cover;"></td>
                        <td><strong>${p.name}</strong></td>
                        <td class="product-price">$${p.price.toFixed(2)}</td>
                        <td>
                            <div class="action-group">
                                <button class="btn-icon btn-edit" onclick="editProduct(${p.id})">Edit</button>
                                <button class="btn-icon btn-del" onclick="deleteProduct(${p.id})">Delete</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        const modalOverlay = document.getElementById('product-modal-overlay');
        const form = document.getElementById('product-form');

        function openModal() {
            form.reset();
            document.getElementById('prod-id').value = '';
            document.getElementById('modal-title').innerText = 'Add Product';
            modalOverlay.classList.add('active');
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
        }

        function editProduct(id) {
            const p = products.find(x => x.id === id);
            if (!p) return;

            document.getElementById('prod-id').value = p.id;
            document.getElementById('prod-name').value = p.name;
            document.getElementById('prod-price').value = p.price;
            document.getElementById('prod-image').value = p.imageUrl || '';
            document.getElementById('prod-desc').value = p.description;
            document.getElementById('modal-title').innerText = 'Edit Product';

            modalOverlay.classList.add('active');
        }

        async function deleteProduct(id) {
            if (confirm("Are you sure you want to delete this product?")) {
                await fetch('/api/products/' + id, { method: 'DELETE' });
                fetchProducts();
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('prod-id').value;
            const payload = {
                name: document.getElementById('prod-name').value,
                price: parseFloat(document.getElementById('prod-price').value),
                imageUrl: document.getElementById('prod-image').value,
                description: document.getElementById('prod-desc').value
            };

            try {
                let res;
                if (id) {
                    res = await fetch('/api/products/' + id, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } else {
                    res = await fetch('/api/products', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                }

                await handleResponse(res);

                alert('Lưu sản phẩm thành công!');
                closeModal();
                fetchProducts();

            } catch (err) {
                alert(err.message);
                console.error("Save error:", err);
            }
        });

        fetchProducts();
    </script>
</body>

</html>
