<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexShop | Premium Store</title>
    <link rel="stylesheet" href="/css/style.css">
    <meta name="description" content="Premium online store for the best products.">
</head>

<body>
    <nav>
        <a href="/" class="brand">NexShop</a>
        <div class="nav-links">
            <a href="/" class="active">Store</a>
            <a href="#" id="cart-btn">Cart (<span id="cart-count">0</span>)</a>
            <a href="/admin-products.html">Admin</a>
        </div>
    </nav>

    <div class="container">
        <div class="header-flex animate-fade-in">
            <h2>Featured Products</h2>
        </div>
        <div class="product-grid" id="product-grid">
        </div>
    </div>

    <div class="modal-overlay" id="cart-overlay"></div>
    <div class="cart-panel" id="cart-panel">
        <div class="modal-header">
            <h3>Your Cart</h3>
            <button class="close-btn" id="close-cart">&times;</button>
        </div>
        <div class="cart-items" id="cart-items">
        </div>
        <div class="cart-total">
            <span>Total:</span>
            <span id="cart-total-price">$0.00</span>
        </div>

        <form id="checkout-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="cust-name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="cust-phone" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Address</label>
                <textarea id="cust-address" class="form-control" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Checkout</button>
        </form>
    </div>

    <script>
        let products = [];
        let cart = [];

        async function fetchProducts() {
            try {
                const res = await fetch('/api/products');
                products = await res.json();
                renderProducts();
            } catch (error) {
                console.error("Failed to load products", error);
            }
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            products.forEach((p, index) => {
                const delay = index * 0.1;
                grid.innerHTML += `
                    <div class="product-card" style="animation: fadeIn 0.5s ease ${delay}s forwards; opacity: 0;">
                        <img src="${p.imageUrl || 'https://via.placeholder.com/300x200?text=No+Image'}" alt="${p.name}" class="product-img">
                        <div class="product-info">
                            <h3 class="product-title">${p.name}</h3>
                            <p class="product-desc">${p.description}</p>
                            <div class="product-footer">
                                <span class="product-price">$${p.price.toFixed(2)}</span>
                                <button class="btn btn-primary" onclick="addToCart(${p.id})">Add to Cart</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(i => i.product.id === productId);
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ product, quantity: 1 });
            }
            updateCartUI();
            openCart();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((sum, item) => sum + item.quantity, 0);

            const itemsContainer = document.getElementById('cart-items');
            itemsContainer.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += item.product.price * item.quantity;
                itemsContainer.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h4>${item.product.name}</h4>
                            <small>Qty: ${item.quantity}</small>
                        </div>
                        <div class="cart-item-price">$${(item.product.price * item.quantity).toFixed(2)}</div>
                    </div>
                `;
            });

            document.getElementById('cart-total-price').innerText = '$' + total.toFixed(2);
        }

        // Cart Panel Toggles
        const cartBtn = document.getElementById('cart-btn');
        const closeCart = document.getElementById('close-cart');
        const cartPanel = document.getElementById('cart-panel');
        const cartOverlay = document.getElementById('cart-overlay');

        function openCart() {
            cartPanel.classList.add('active');
            cartOverlay.classList.add('active');
        }

        function hideCart() {
            cartPanel.classList.remove('active');
            cartOverlay.classList.remove('active');
        }

        cartBtn.addEventListener('click', (e) => { e.preventDefault(); openCart(); });
        closeCart.addEventListener('click', hideCart);
        cartOverlay.addEventListener('click', hideCart);

        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (cart.length === 0) {
                alert("Cart is empty!");
                return;
            }

            const orderReq = {
                customerName: document.getElementById('cust-name').value,
                customerPhone: document.getElementById('cust-phone').value,
                address: document.getElementById('cust-address').value,
                items: cart.map(item => ({
                    productId: item.product.id,
                    quantity: item.quantity
                }))
            };

            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderReq)
                });

                if (res.ok) {
                    alert('Order placed successfully!');
                    cart = [];
                    updateCartUI();
                    hideCart();
                    document.getElementById('checkout-form').reset();
                } else {
                    alert('Failed to place order.');
                }
            } catch (err) {
                console.error(err);
                alert('Error placing order.');
            }
        });

        fetchProducts();
    </script>
</body>

</html>
